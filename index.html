<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caveirao do Hot Dog</title>
    <!-- Importando a fonte Inter -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Importando Ícones Lucide (Versão Fixa para Segurança) -->
    <script src="https://unpkg.com/lucide@0.477.0"></script>
    <style>
      :root {
        --pizza-red: #d32f2f;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: #000;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 2rem 1rem;
        overflow-x: hidden;
        position: relative;
      }

      /* --- Efeito Nebulosa --- */
      .nebula-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      }

      .nebula {
        position: absolute;
        border-radius: 50%;
        background: #fff;
        filter: blur(120px);
        opacity: 0.1;
      }

      .nebula-1 {
        top: -20%;
        left: -10%;
        width: 80vw;
        height: 80vw;
        animation: pulse1 12s ease-in-out infinite;
      }

      .nebula-2 {
        bottom: -30%;
        right: -20%;
        width: 90vw;
        height: 90vw;
        animation: pulse2 15s ease-in-out infinite;
      }

      @keyframes pulse1 {
        0%,
        100% {
          transform: scale(1) translate(0, 0);
          opacity: 0.08;
        }
        50% {
          transform: scale(1.2) translate(30px, -20px);
          opacity: 0.18;
        }
      }

      @keyframes pulse2 {
        0%,
        100% {
          transform: scale(1.2) translate(0, 0);
          opacity: 0.05;
        }
        50% {
          transform: scale(1) translate(-40px, 30px);
          opacity: 0.15;
        }
      }

      /* --- Card Principal --- */
      .card {
        width: 100%;
        max-width: 400px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 2rem;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        z-index: 10;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* --- Header --- */
      .logo-container {
        width: 205px;
        height: 205px;
        margin-bottom: 1.5rem;
      }

      .logo-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .tagline {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        text-align: center;
        opacity: 0.9;
        margin-bottom: 2.5rem;
        line-height: 1.5;
      }

      /* --- Links --- */
      .links-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .link-button {
        position: relative;
        width: 100%;
        padding: 1rem 3.5rem; /* Increased side padding for balance */
        border-radius: 9999px;
        text-decoration: none;
        color: #fff;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        border: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.1);
        font-size: 14px;
        text-align: center;
      }

      .link-button i,
      .link-button svg {
        position: absolute;
        left: 1.5rem; /* Justifies icon to the left */
        width: 20px;
        height: 20px;
        opacity: 0.8;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .link-button:hover {
        background: rgba(211, 47, 47, 0.8);
        transform: scale(1.02);
        box-shadow: 0 10px 15px -3px rgba(211, 47, 47, 0.3);
      }

      .link-button.highlight {
        background: var(--pizza-red);
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.1);
      }

      .link-button.highlight:hover {
        background: #b71c1c;
        transform: scale(1.02);
      }

      /* --- Footer --- */
      .footer {
        margin-top: 3rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        opacity: 0.4;
        transition: opacity 0.3s;
      }

      .footer:hover {
        opacity: 0.7;
      }

      .footer p {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .footer-logo {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .footer-logo img {
        height: 60px;
        width: auto;
        opacity: 0.85;
        transition: opacity 0.3s;
      }

      .footer:hover .footer-logo img {
        opacity: 1;
      }

      /* --- Responsividade Desktop --- */
      @media (min-width: 768px) {
        .logo-container {
          width: 256px;
          height: 256px;
        }
        .tagline {
          font-size: 12px;
        }
        .link-button {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Fundo de Nebulosa -->
    <div class="nebula-container">
      <div class="nebula nebula-1"></div>
      <div class="nebula nebula-2"></div>
    </div>

    <!-- Card Principal -->
    <div class="card">
      <div class="logo-container">
        <!-- Substitua o SRC pela sua logo final -->
        <img src="logo.webp" alt="Logo" />
      </div>

      <p class="tagline">
        <span style="font-size: 1.4em; font-weight: 700">O melhor Hot Dog</span
        ><br />Feito com amor e ingredientes fresquinhos!
      </p>

      <div class="links-container">
        <a
          href="https://g.page/r/CZ2KT0rK6kf_EBM/review"
          class="link-button highlight"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i data-lucide="star"></i>
          <span>Nos avalie no Google</span>
        </a>
        <a
          href="https://wa.link/6nzk1t"
          class="link-button"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i data-lucide="message-circle"></i>
          <span>Pedir no WhatsApp</span>
        </a>

        <a
          href="https://www.google.com/maps/search/?api=1&query=Caveirão+do+Hot+Dog&query_place_id=ChIJ-wuNoJETWpMRnYpPSsrqR_8"
          class="link-button"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i data-lucide="map-pin"></i>
          <span>Ver Localização</span>
        </a>

        <a
          href="cardapio.webp"
          class="link-button"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i data-lucide="utensils"></i>
          <span>Cardápio</span>
        </a>

        <a
          href="#"
          class="link-button"
          onclick="
            downloadVCard();
            return false;
          "
        >
          <i data-lucide="user-plus"></i>
          <span>Salvar Contato</span>
        </a>
      </div>

      <div class="footer">
        <p>Desenvolvida por</p>
        <div class="footer-logo">
          <img src="logoMulty.webp" alt="MultyDigital" />
        </div>
      </div>
    </div>

    <script>
      // Inicializa os ícones Lucide
      lucide.createIcons();

      // Gera e baixa o vCard
      function downloadVCard() {
        const vcard =
          "BEGIN:VCARD\nVERSION:3.0\nFN:Caveira\nORG:Caveirão do Hot Dog\nTEL;TYPE=CELL:+5561996816304\nEND:VCARD";
        const blob = new Blob([vcard], { type: "text/vcard" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "Caveirão do Hot Dog.vcf";
        a.click();
        URL.revokeObjectURL(url);
      }
    </script>
  </body>
</html>
